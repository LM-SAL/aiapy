name: Update SPEC 0 dependencies

on:
  schedule:
    - cron: "0 0 3 1,4,7,10 *"  # quarterly, day 3 (after schedule release on day 1)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: scientific-python/spec0-action@6d7df2702c1dfc225a7ce5918616db9a6a652901  # v1.4
        with:
          update_all: 2  # also bump non-SPEC0 deps older than 2 years
